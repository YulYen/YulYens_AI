name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Format & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tooling
        run: pip install -r requirements-dev.txt
      - name: Black (check only)
        run: black --check .
      - name: Ruff
        run: ruff check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests
        # spaCy- and Ollama-dependent tests skip themselves when the
        # model or server is unavailable (see tests/conftest.py).
        run: pytest -q -m "not ollama"
