[tool.black]
line-length = 88
target-version = ["py310"]

[tool.ruff]
src = ["."]
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "ISC"]
ignore = ["E203", "E501"]

[tool.ruff.lint.per-file-ignores]
# Tests stub modules in sys.modules before importing the unit under test.
"tests/*" = ["E402"]
